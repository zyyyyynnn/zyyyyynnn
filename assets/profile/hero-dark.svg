<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="360" viewBox="0 0 1280 360" role="img" aria-labelledby="title desc">
  <title id="title">ynzhang — full-stack engineer</title>
  <desc id="desc">Editorial engineering profile banner in a restrained dark neutral palette.</desc>
  <rect width="1280" height="360" rx="24" fill="#0B0B0A"/>
  <rect x="1" y="1" width="1278" height="358" rx="23" fill="none" stroke="#3C3730"/>

