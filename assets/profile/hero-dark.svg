  <text x="56" y="244" fill="#F5F2EC" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="650">AI-native product systems.</text>

  <text x="58" y="288" fill="#CBC3B8" font-family="Inter, Arial, sans-serif" font-size="16">Architecture · Data workflows · Reliable application delivery</text>

