<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-labelledby="title desc">
  <title id="title">ynzhang — full-stack engineer</title>
  <desc id="desc">A minimal editorial profile title with a typographic YN monogram.</desc>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="#15130F" stroke-opacity="0.035" stroke-width="1"/>
    </pattern>
    <clipPath id="monogram-clip">
      <rect x="730" y="40" width="410" height="240" rx="16"/>
    </clipPath>
  </defs>

  <rect width="1200" height="320" rx="26" fill="#F5F2EC"/>
  <rect width="1200" height="320" rx="26" fill="url(#grid)"/>
  <rect x="1" y="1" width="1198" height="318" rx="25" fill="none" stroke="#DED7CC"/>

  <g transform="translate(58 42)" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC',sans-serif">
    <text x="0" y="16" fill="#81776D" font-size="14" font-weight="700" letter-spacing="3">PROFILE · PRODUCT SYSTEMS</text>
    <rect x="0" y="33" width="52" height="5" rx="2.5" fill="#7E191B"/>

    <text x="0" y="125" fill="#15130F" font-size="82" font-weight="820" letter-spacing="-4">YNZHANG</text>
    <text x="2" y="174" fill="#15130F" font-size="27" font-weight="650">Full-stack engineer building reliable</text>
    <text x="2" y="210" fill="#15130F" font-size="27" font-weight="650">AI product systems.</text>

    <text x="2" y="258" fill="#81776D" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="13" font-weight="600" letter-spacing="1.6">PRODUCT · ARCHITECTURE · DATA · AI</text>
  </g>

  <g clip-path="url(#monogram-clip)">
    <rect x="730" y="40" width="410" height="240" rx="16" fill="#FBFAF6" fill-opacity="0.48" stroke="#DED7CC"/>
    <text x="748" y="246" fill="#15130F" fill-opacity="0.055" stroke="#15130F" stroke-opacity="0.16" stroke-width="1.2" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="235" font-weight="900" letter-spacing="-28">YN</text>
    <path d="M930 58V262" stroke="#7E191B" stroke-width="3"/>
    <rect x="922" y="151" width="16" height="16" fill="#7E191B"/>
    <path d="M752 68H1118M752 252H1118" stroke="#15130F" stroke-opacity="0.11"/>
    <text x="756" y="84" fill="#81776D" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" letter-spacing="1.8">PERSONAL SYSTEM / 01</text>
    <text x="1118" y="270" text-anchor="end" fill="#81776D" font-family="ui-monospace,SFMono-Regular,Menlo,Consolas,monospace" font-size="11" letter-spacing="1.8">@ZYYYYYNNN</text>
  </g>
