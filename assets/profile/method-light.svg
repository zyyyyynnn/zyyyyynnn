<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="184" viewBox="0 0 1280 184" role="img" aria-labelledby="title desc">
  <title id="title">Working method</title>
  <desc id="desc">A four-step engineering method: frame, contract, build, prove.</desc>
  <rect width="1280" height="184" rx="20" fill="#F5F2EC"/>
  <rect x="1" y="1" width="1278" height="182" rx="19" fill="none" stroke="#DED7CC"/>
  <text x="40" y="42" fill="#15130F" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">WORKING METHOD</text>
  <text x="1240" y="42" text-anchor="end" fill="#81776D" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="11" letter-spacing="1.4">FRAME → CONTRACT → BUILD → PROVE</text>

  <line x1="132" y1="98" x2="1148" y2="98" stroke="#CBC3B8" stroke-width="2.4"/>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(116 76)">
      <circle cx="16" cy="22" r="16" fill="#7E191B"/>
      <text x="16" y="27" text-anchor="middle" fill="#FBFAF6" font-size="12" font-weight="700">01</text>
      <text x="48" y="16" fill="#15130F" font-size="18" font-weight="700">Frame</text>
      <text x="48" y="38" fill="#3C3730" font-size="14">Clarify the problem, the scope, and the edge cases.</text>
    </g>

    <g transform="translate(398 76)">
      <circle cx="16" cy="22" r="16" fill="#7E191B"/>
      <text x="16" y="27" text-anchor="middle" fill="#FBFAF6" font-size="12" font-weight="700">02</text>
      <text x="48" y="16" fill="#15130F" font-size="18" font-weight="700">Contract</text>
      <text x="48" y="38" fill="#3C3730" font-size="14">Make interfaces explicit before implementation expands.</text>
    </g>

    <g transform="translate(690 76)">
      <circle cx="16" cy="22" r="16" fill="#7E191B"/>
      <text x="16" y="27" text-anchor="middle" fill="#FBFAF6" font-size="12" font-weight="700">03</text>
      <text x="48" y="16" fill="#15130F" font-size="18" font-weight="700">Build</text>
      <text x="48" y="38" fill="#3C3730" font-size="14">Ship systems that stay readable under real product pressure.</text>
    </g>

    <g transform="translate(980 76)">
      <circle cx="16" cy="22" r="16" fill="#7E191B"/>
      <text x="16" y="27" text-anchor="middle" fill="#FBFAF6" font-size="12" font-weight="700">04</text>
      <text x="48" y="16" fill="#15130F" font-size="18" font-weight="700">Prove</text>
      <text x="48" y="38" fill="#3C3730" font-size="14">Verify behavior with evidence, observability, and review.</text>
    </g>
  </g>
</svg>
