<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="218" viewBox="0 0 1280 218" role="img" aria-labelledby="title desc">
  <title id="title">Working method</title>
  <desc id="desc">A four-step engineering method: frame, contract, build, prove.</desc>
  <rect width="1280" height="218" rx="20" fill="#F5F2EC"/>
  <rect x="1" y="1" width="1278" height="216" rx="19" fill="none" stroke="#DED7CC"/>
  <text x="40" y="42" fill="#15130F" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="700">WORKING METHOD</text>
  <text x="1240" y="42" text-anchor="end" fill="#81776D" font-family="ui-monospace, SFMono-Regular, Consolas, monospace" font-size="11" letter-spacing="1.4">FRAME / CONTRACT / BUILD / PROVE</text>

  <line x1="330" y1="74" x2="330" y2="184" stroke="#DED7CC"/>
  <line x1="630" y1="74" x2="630" y2="184" stroke="#DED7CC"/>
  <line x1="930" y1="74" x2="930" y2="184" stroke="#DED7CC"/>

  <g font-family="Inter, Arial, sans-serif">
    <g transform="translate(56 78)">
      <circle cx="16" cy="16" r="16" fill="#7E191B"/>
      <text x="16" y="21" text-anchor="middle" fill="#FBFAF6" font-size="12" font-weight="700">01</text>
      <text x="48" y="13" fill="#15130F" font-size="19" font-weight="700">Frame</text>
      <text x="48" y="38" fill="#3C3730" font-size="14">
        <tspan x="48" dy="0">Define scope, risks,</tspan>
        <tspan x="48" dy="20">and acceptance.</tspan>
      </text>
    </g>

    <g transform="translate(356 78)">
      <circle cx="16" cy="16" r="16" fill="#7E191B"/>
      <text x="16" y="21" text-anchor="middle" fill="#FBFAF6" font-size="12" font-weight="700">02</text>
      <text x="48" y="13" fill="#15130F" font-size="19" font-weight="700">Contract</text>
      <text x="48" y="38" fill="#3C3730" font-size="14">
        <tspan x="48" dy="0">Freeze interfaces</tspan>
        <tspan x="48" dy="20">and data contracts.</tspan>
      </text>
    </g>

    <g transform="translate(656 78)">
      <circle cx="16" cy="16" r="16" fill="#7E191B"/>
      <text x="16" y="21" text-anchor="middle" fill="#FBFAF6" font-size="12" font-weight="700">03</text>
      <text x="48" y="13" fill="#15130F" font-size="19" font-weight="700">Build</text>
      <text x="48" y="38" fill="#3C3730" font-size="14">
        <tspan x="48" dy="0">Implement with clear</tspan>
        <tspan x="48" dy="20">runtime boundaries.</tspan>
      </text>
    </g>

    <g transform="translate(956 78)">
      <circle cx="16" cy="16" r="16" fill="#7E191B"/>
      <text x="16" y="21" text-anchor="middle" fill="#FBFAF6" font-size="12" font-weight="700">04</text>
      <text x="48" y="13" fill="#15130F" font-size="19" font-weight="700">Prove</text>
      <text x="48" y="38" fill="#3C3730" font-size="14">
        <tspan x="48" dy="0">Verify behavior with</tspan>
        <tspan x="48" dy="20">evidence and review.</tspan>
      </text>
    </g>
  </g>
</svg>
